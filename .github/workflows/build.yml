name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip & Build APK
        run: |
          mkdir -p extracted
          
          LATEST_ZIP=$(ls -t *.zip 2>/dev/null | head -n 1)
          if [ -n "$LATEST_ZIP" ]; then
            echo "Unzipping latest file: $LATEST_ZIP"
            unzip -o "$LATEST_ZIP" -d extracted
          else
            echo "No zip file found, building from repository root"
            cp -r . extracted/ 2>/dev/null || true
          fi

          BUILD_DIR=$(find extracted -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | head -n 1 | xargs dirname)
          echo "Found project directory: $BUILD_DIR"
          cd "$BUILD_DIR"
          
          echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djava.awt.headless=true" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

          mkdir -p ~/.android
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          cp debug.keystore ~/.android/debug.keystore || true
          if [ -d "app" ]; then
            cp debug.keystore app/ || true
          fi

          python3 -c "import os, re, json; pkgs = set(); [pkgs.add(m) for root, _, files in os.walk('.') for f in files if f.endswith(('.gradle', '.kts', '.xml', '.kt', '.java')) for m in re.findall(r'(?:applicationId|namespace|package)\s*=?\s*[\'\"]([^\'\"]+)[\'\"]', open(os.path.join(root, f), errors='ignore').read()) if '.' in m and not m.startswith(('android.', 'androidx.'))]; pkgs = list(pkgs) or ['com.example.app']; data = {'project_info': {'project_number': '1234567890', 'project_id': 'dummy-project'}, 'client': [{'client_info': {'mobilesdk_app_id': f'1:1234567890:android:1234567890{i}', 'android_client_info': {'package_name': p}}, 'api_key': [{'current_key': 'dummy_key'}]} for i, p in enumerate(pkgs)]}; [open(os.path.join(d, 'google-services.json'), 'w').write(json.dumps(data, indent=2)) for d in ['.', 'app', 'app/src/main', 'app/src/debug'] if os.path.exists(d)]; print('Generated JSON for:', pkgs)"

          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon -Djava.awt.headless=true -Dkotlin.compiler.execution.strategy=in-process
          else
            gradle assembleDebug --no-daemon -Djava.awt.headless=true -Dkotlin.compiler.execution.strategy=in-process
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: extracted/**/build/outputs/apk/debug/*.apk
