name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip & Build APK
        run: |
          mkdir -p extracted
          unzip -o "*.zip" -d extracted
          BUILD_DIR=$(find extracted -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | head -n 1 | xargs dirname)
          echo "Found project directory: $BUILD_DIR"
          cd "$BUILD_DIR"
          
          # Fix KSP IntelliJ issue in GitHub Actions CLI
          echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties

          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon -Dkotlin.compiler.execution.strategy=in-process
          else
            gradle assembleDebug --no-daemon -Dkotlin.compiler.execution.strategy=in-process
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: extracted/**/build/outputs/apk/debug/*.apk
