name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip & Build APK
        run: |
          mkdir -p extracted
          unzip -o "*.zip" -d extracted
          BUILD_DIR=$(find extracted -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | head -n 1 | xargs dirname)
          echo "Found project directory: $BUILD_DIR"
          cd "$BUILD_DIR"
          
          # Fix KSP AWT Headless & Daemon issues on Linux CI
          echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djava.awt.headless=true" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

          # 1. Generate missing debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          
          if [ -d "app" ]; then
            cp debug.keystore app/ || true
            
            # 2. Generate matching google-services.json for package com.aistudio.subtitletts.v2x9q
            echo '{"project_info":{"project_number":"1234567890","project_id":"dummy-project"},"client":[{"client_info":{"mobilesdk_app_id":"1:1234567890:android:1234567890","android_client_info":{"package_name":"com.aistudio.subtitletts.v2x9q"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json
          fi

          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon -Djava.awt.headless=true -Dkotlin.compiler.execution.strategy=in-process
          else
            gradle assembleDebug --no-daemon -Djava.awt.headless=true -Dkotlin.compiler.execution.strategy=in-process
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: extracted/**/build/outputs/apk/debug/*.apk
