name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip & Build APK
        run: |
          mkdir -p extracted
          
          # Find and unzip ONLY the latest uploaded zip file
          LATEST_ZIP=$(ls -t *.zip 2>/dev/null | head -n 1)
          if [ -n "$LATEST_ZIP" ]; then
            echo "Unzipping latest file: $LATEST_ZIP"
            unzip -o "$LATEST_ZIP" -d extracted
          else
            echo "No zip file found, building from repository root"
            cp -r . extracted/ 2>/dev/null || true
          fi

          BUILD_DIR=$(find extracted -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | head -n 1 | xargs dirname)
          echo "Found project directory: $BUILD_DIR"
          cd "$BUILD_DIR"
          
          # Fix KSP AWT Headless & Daemon issues
          echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djava.awt.headless=true" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

          # 1. Generate debug.keystore in all necessary paths
          mkdir -p ~/.android
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          cp debug.keystore ~/.android/debug.keystore || true
          if [ -d "app" ]; then
            cp debug.keystore app/ || true
          fi

          # 2. Universal Python script to match ALL package names
          python3 -c '
import os, re, json

packages = set()

for root, dirs, files in os.walk("."):
    for f in files:
        if f.endswith((".gradle", ".kts", ".xml", ".kt", ".java")):
            path = os.path.join(root, f)
            try:
                content = open(path, errors="ignore").read()
                matches = re.findall(r"(?:applicationId|namespace|package)\s*=?\s*[\"\']([^\"\']+)[\"\']", content)
                for m in matches:
                    if "." in m and not m.startswith("android.") and not m.startswith("androidx."):
                        packages.add(m)
                pkg_matches = re.findall(r"package\s+([a-zA-Z0-9_.]+)", content)
                for m in pkg_matches:
                    if "." in m and not m.startswith("android.") and not m.startswith("androidx."):
                        packages.add(m)
            except Exception:
                pass

if not packages:
    packages.add("com.example.app")

clients = []
for idx, pkg in enumerate(packages):
    clients.append({
        "client_info": {
            "mobilesdk_app_id": f"1:1234567890:android:1234567890{idx}",
            "android_client_info": {"package_name": pkg}
        },
        "api_key": [{"current_key": "dummy_key"}]
    })

data = {
    "project_info": {"project_number": "1234567890", "project_id": "dummy-project"},
    "client": clients
}

for td in [".", "app", "app/src/main", "app/src/debug"]:
    if os.path.exists(td):
        with open(os.path.join(td, "google-services.json"), "w") as f:
            json.dump(data, f, indent=2)

print(f"Generated google-services.json for packages: {list(packages)}")
'

          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon -Djava.awt.headless=true -Dkotlin.compiler.execution.strategy=in-process
          else
            gradle assembleDebug --no-daemon -Djava.awt.headless=true -Dkotlin.compiler.execution.strategy=in-process
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: extracted/**/build/outputs/apk/debug/*.apk
